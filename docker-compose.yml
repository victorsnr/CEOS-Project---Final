services:

  db:
    image: postgres:16
    container_name: postgres-db

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: meubanco

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  flask-app:
    build: ./back

    container_name: flask-app

    ports:
      - "5000:5000"

    depends_on:
      db:
        condition: service_healthy

    env_file:
      - ./back/.env

  frontend:
    build: ./front

    container_name: react-frontend

    ports:
      - "5173:5173"

    volumes:
      - ./front:/app
      - /app/node_modules

    depends_on:
      - flask-app

volumes:
  postgres_data: